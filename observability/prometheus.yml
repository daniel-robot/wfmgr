# Prometheus scrape config for the wfmgr local-dev stack.
#
# Targets:
#   - rabbitmq:15692 — built-in `rabbitmq_prometheus` plugin (enabled by default
#     on the management image). Exposes queue depth, consumer count, error-queue
#     backlog, connection state, etc. Useful PromQL:
#       rabbitmq_queue_messages{queue=~".*_error"}   # DLQ depth per endpoint
#       rabbitmq_queue_messages_ready                # work backlog
#       rabbitmq_channel_consumers                   # confirms wfmgr is connected
#   - wfmgr-api on the docker host (if you wire MassTransit's OpenTelemetry
#     metrics + an /metrics endpoint later). Not enabled by default.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: rabbitmq
    static_configs:
      - targets: ['rabbitmq:15692']
        labels:
          env: local
          service: rabbitmq

  # Uncomment once Wfmgr.Api exposes Prometheus metrics (e.g. via
  # OpenTelemetry.Exporter.Prometheus.AspNetCore + app.MapPrometheusScrapingEndpoint()).
  # - job_name: wfmgr-api
  #   static_configs:
  #     - targets: ['host.docker.internal:5223']
  #       labels:
  #         env: local
  #         service: wfmgr-api
