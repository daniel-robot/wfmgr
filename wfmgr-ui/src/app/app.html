<div class="app-shell">
  <header class="topbar">
    <div class="topbar-left">
      <div class="title">wfmgr-ui</div>
      <div class="subtitle">Radiotherapy Workflow Testing Console</div>
    </div>
    <div class="topbar-right">
      @if (isAuthenticated() && currentUser(); as user) {
        <span class="user-info">
          {{ user.displayName }}
          <span class="user-role-badge">{{ user.role }}</span>
        </span>
        <button class="btn-logout" (click)="logout()">Logout</button>
      } @else {
        <a routerLink="/login" class="btn-login">Sign In</a>
      }
    </div>
  </header>

  <nav class="nav">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Dashboard</a>
    @if (currentUser()?.role === 'Admin') {
      <a routerLink="/workflow-config" routerLinkActive="active">Workflow Config</a>
      <a routerLink="/workflow-transitions" routerLinkActive="active">Transitions</a>
      <a routerLink="/workflow-vocabulary" routerLinkActive="active">Vocabulary</a>
      <a routerLink="/case-status-overlays" routerLinkActive="active">Statuses</a>
    }
    <a routerLink="/events" routerLinkActive="active">Events</a>
    <a routerLink="/audit-logs" routerLinkActive="active">Audit Logs</a>
    <a routerLink="/monaco-forward" routerLinkActive="active">Monaco Forward</a>
  </nav>

  <main class="content">
    <router-outlet />
  </main>
</div>
