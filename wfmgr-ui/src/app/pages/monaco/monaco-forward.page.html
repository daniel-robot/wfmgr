<section class="page">
  <h1>Manual Monaco Forward Test</h1>

  <form [formGroup]="form" (ngSubmit)="submit()" class="card">
    <label>
      CaseId
      <input formControlName="caseId" />
    </label>

    <button type="submit" [disabled]="busy">{{ busy ? 'Submitting...' : 'Forward to Monaco' }}</button>

    @if (ok) {
      <p class="ok">{{ ok }}</p>
    }

    @if (error) {
      <p class="error">{{ error }}</p>
    }
  </form>
</section>
