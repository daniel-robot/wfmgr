<section class="page">
  <h1>Workflow Test Console</h1>
  <p class="lead">Use this dashboard to test V1 chain: CT -> wfmgr -> PvMed -> wfmgr -> Monaco.</p>

  <div class="card-grid">
    @for (card of cards; track card.route) {
      <a class="nav-card" [routerLink]="card.route">
        <h2>{{ card.title }}</h2>
        <p>{{ card.description }}</p>
      </a>
    }
  </div>
</section>
